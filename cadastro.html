<!DOCTYPE html>
<html lang="pt-br">

<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>AuDoção - Criar Conta</title>
     <link rel="stylesheet" href="style.css">
     <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body class="auth-page">

     <main class="auth-container">
          <section class="auth-card">
               <div class="auth-header">
                    <h2 class="logo">AuDoção</h2>
                    <p>Crie sua conta para começar a ajudar pets.</p>
               </div>

               <form class="auth-form">
                    <div class="input-group">
                         <label for="nome">Nome Completo</label>
                         <input type="text" id="nome" placeholder="Seu nome" required>
                    </div>

                    <div class="input-group">
                         <label for="email">E-mail</label>
                         <input type="email" id="email" placeholder="seu@email.com" required>
                    </div>

                    <div class="input-group">
                         <label for="password">Senha</label>
                         <input type="password" id="password" placeholder="Mínimo 8 caracteres" required>
                    </div>

                    <div class="input-group">
                         <label for="confirm-password">Confirmar Senha</label>
                         <input type="password" id="confirm-password" placeholder="Repita sua senha" required>
                    </div>

                    <button type="submit" class="btn btn-primary">Criar Conta</button>
               </form>

               <div class="auth-footer">
                    <p>Já tem uma conta? <a href="login.html">Faça login</a></p>
               </div>
          </section>
     </main>

</body>

</html>
