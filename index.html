<!DOCTYPE html>
<html lang="pt-br">

<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>AuDoção - Encontre seu pet</title>
     <link rel="stylesheet" href="style.css">
     <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

     <nav class="navbar">
          <div class="logo">AuDoção</div>
          <div class="nav-links">
               <a href="#">Sobre nós</a>
               <a href="#">Parceiros</a>
               <a href="login.html" class="btn-login">Entrar</a>
          </div>
     </nav>

     <main class="hero-container">
          <section class="hero-image">
               <div class="image-wrapper">
                    <img src="/src/dogandcat.png" alt="Cachorro e Gato AuDoção">
               </div>
               <div class="decoration-circle"></div>
          </section>

          <section class="hero-content">
               <div class="content-box">
                    <h1>Um novo começo a um clique de distância.</h1>
                    <p>Seja para encontrar um novo amigo ou para oferecer um lar seguro, o AuDoção conecta corações e
                         transforma vidas.</p>

                    <div class="actions">
                         <button class="btn btn-primary">Quero Adotar</button>
                         <button class="btn btn-secondary">Quero Doar</button>
                    </div>

                    <span class="stats">Mais de 500 pets encontrados este mês 🐾</span>
               </div>
          </section>
     </main>

</body>

</html>
